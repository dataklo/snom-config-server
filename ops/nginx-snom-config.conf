server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /opt/snom-config-server/public;
    index index.php;

    # Zugriffsschutz
    auth_basic "Snom Config";
    auth_basic_user_file /etc/nginx/.htpasswd-snom;

    # Härtung
    server_tokens off;
    client_max_body_size 1m;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location / {
        try_files $uri $uri/ =404;
    }

    # Zusätzlicher Schutz: Konfigurationsdaten sind nicht im Webroot,
    # aber falls ein Alias/Fehlkonfiguration entsteht, bleibt /data gesperrt.
    location ^~ /data/ {
        deny all;
        return 403;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.|/\.git {
        deny all;
    }
}
